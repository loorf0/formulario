<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cadastro de Clientes</title>
</head>
<body>

    <main>
        <h1>Cadastro dos Clientes</h1>
        
        <form action="#" method="POST">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>

            <label for="cpf">CPF</label>
            <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>

            <label for="dt_nasc">Data de Nascimento</label>
            <input type="date" id="dt_nasc" name="dt_nasc" required>

            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="exemplo@email.com" required>

            <label for="celular">Celular</label>
            <input type="tel" id="celular" name="celular" placeholder="(00) 00000-0000" required>

            <label for="cep">CEP</label>
            <input type="text" id="cep" name="cep" placeholder="00000-000" required>

            <label for="bairro">Bairro</label>
            <input type="text" id="bairro" name="bairro" placeholder="Digite seu bairro" required>

            <label for="cidade">Cidade</label>
            <input type="text" id="cidade" name="cidade" placeholder="Digite sua cidade" required>

            <label for="estado">Estado</label>
            <input type="text" id="estado" name="estado" placeholder="Ex: SP" maxlength="2" required>

            <label for="input - Number">Numero</label>
            <input id="input - Number" type="number" name="Numero" min="0" max="10"required/>

            <label for = "input - rua">RUA</label>
            <input id="input - rua" type="text" name="rua" required>

            <div class="button-group">
                <button type="submit">Enviar Cadastro</button>
                <button type="reset">Limpar</button>
            </div>
        </form>
    </main>

</body>
</html>
